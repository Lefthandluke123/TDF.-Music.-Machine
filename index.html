<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TDF Music Machine</title>
    <style>
        :root {
            --bg-dark: #1a1c1a;
            --card-bg: #242b24;
            --celtic-green: #4a7c2c;
            --griffin-orange: #e67e22;
            --griffin-red: #c0392b;
            --text-light: #e0eadd;
            --lcd-bg: #0d110d;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin: 20px 0; width: 90%; }
        
        /* Logo stijl met pulse-animatie */
        .logo { 
            max-height: 80px; 
            max-width: 100%; 
            height: auto; 
            margin-bottom: 10px; 
            object-fit: contain;
            transition: transform 0.1s, filter 0.1s;
        }

        .logo.pulse {
            transform: scale(1.1);
            filter: drop-shadow(0 0 10px var(--celtic-green));
        }

        .container { width: 100%; max-width: 500px; padding: 20px 10px; }

        .card {
            background: var(--card-bg); padding: 25px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            border: 2px solid var(--celtic-green);
        }

        select, input[type=range] {
            width: 100%; padding: 12px; margin: 10px 0 20px 0;
            border-radius: 8px; background: #111; color: white; border: 1px solid var(--celtic-green); font-size: 16px;
        }

        button {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            font-size: 18px; font-weight: bold; color: white;
            background: var(--celtic-green); cursor: pointer; transition: 0.1s;
        }

        button.active-btn { background: var(--griffin-red); }

        .bpm-display { font-size: 4rem; font-weight: bold; color: var(--celtic-green); }
        .beat-indicator { display: flex; justify-content: center; gap: 6px; margin-top: 20px; flex-wrap: wrap; }
        .dot { width: 14px; height: 14px; background: #333; border-radius: 50%; transition: 0.1s; }
        .dot.lit { background: var(--celtic-green); transform: scale(1.3); }
        .dot.accent-mark { border: 2px solid var(--griffin-orange); }
        .hints { font-size: 14px; color: var(--griffin-orange); margin-top: 10px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="header">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRhN2MyYyI+PHBhdGggZD0iTTEyIDJMMiA3djEwbDEwIDUgMTAtNVY3TDEyIDJ6bTAgMi44bTcuNSAzLjdMMTIgMTIuMSA0LjUgOC41IDEyIDQuOHpNNCAxNi4xVjkuNWw3IDIuNnY2LjZsLTcgLTIuNnptMTYgMEwxMyAxOC43di02LjZsNy0yLjZ2Ni42eiIvPjwvc3ZnPg==" 
             alt="TDF Logo" class="logo" id="mainLogo">
        <h1>TDF Music Machine</h1>
    </div>

    <div class="container">
        <div class="card">
            <div class="bpm-display" id="bpmText">110</div>
            <input type="range" id="tempoSlider" min="40" max="220" value="110">
            
            <select id="timeSig">
                <option value="4">Reel (4/4)</option>
                <option value="4h">Hornpipe (Swung)</option>
                <option value="2">Polka (2/4)</option>
                <option value="6">Jig (6/8)</option>
                <option value="9">Slip Jig (9/8)</option>
                <option value="12">Slide (12/8)</option>
            </select>

            <div class="hints" id="rhythmHint">Straight: 1 - 2 - 3 - 4</div>
            
            <div class="beat-indicator" id="dots"></div>
            <br>
            <button id="metroBtn">START MACHINE</button>
        </div>
    </div>

    <script>
        let metroCtx, metroTimer, isMetroRunning = false;
        let nextNoteTime = 0.0, currentBeat = 0;
        const metroBtn = document.getElementById('metroBtn');
        const timeSig = document.getElementById('timeSig');
        const dotsContainer = document.getElementById('dots');
        const rhythmHint = document.getElementById('rhythmHint');
        const mainLogo = document.getElementById('mainLogo');

        const hints = {
            "4": "Straight: 1 - 2 - 3 - 4",
            "4h": "Swing: Humpty - Dumpty",
            "2": "Fast: 1 - 2, 1 - 2",
            "6": "Jig: Rashers-and-Sausages",
            "9": "Slip Jig: 1-2-3, 4-5-6, 7-8-9",
            "12": "Slide: Heavy 12/8 feel"
        };

        function createDots() {
            dotsContainer.innerHTML = '';
            const val = timeSig.value === "4h" ? 4 : parseInt(timeSig.value);
            for (let i = 0; i < val; i++) {
                const d = document.createElement('div');
                d.className = 'dot';
                if (i === 0) d.classList.add('accent-mark');
                dotsContainer.appendChild(d);
            }
            rhythmHint.textContent = hints[timeSig.value];
            currentBeat = 0;
        }

        function playWoodblock(time, frequency, volume) {
            const osc = metroCtx.createOscillator();
            const gain = metroCtx.createGain();
            const filter = metroCtx.createBiquadFilter();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(frequency, time);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1200, time);

            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(volume, time + 0.005);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(metroCtx.destination);

            osc.start(time);
            osc.stop(time + 0.2);
        }

        function metroScheduler() {
            while (nextNoteTime < metroCtx.currentTime + 0.1) {
                const sigType = timeSig.value;
                const isHornpipe = (sigType === "4h");
                const sig = isHornpipe ? 4 : parseInt(sigType);

                let isAccent = (currentBeat === 0);
                if (sig === 6 && currentBeat === 3) isAccent = true;
                if (sig === 9 && (currentBeat === 3 || currentBeat === 6)) isAccent = true;
                if (sig === 12 && (currentBeat === 3 || currentBeat === 6 || currentBeat === 9)) isAccent = true;

                let volume = isAccent ? 0.4 : 0.2;
                let freq = isAccent ? 880 : 440;

                if (isHornpipe && currentBeat % 2 !== 0) volume *= 0.7;

                playWoodblock(nextNoteTime, freq, volume);

                const bIdx = currentBeat;
                setTimeout(() => {
                    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('lit', i === bIdx));
                    
                    // Logo pulse effect
                    mainLogo.classList.add('pulse');
                    setTimeout(() => mainLogo.classList.remove('pulse'), 100);
                }, (nextNoteTime - metroCtx.currentTime) * 1000);

                const tempo = parseInt(document.getElementById('tempoSlider').value);
                const secondsPerBeat = 60.0 / tempo;

                if (isHornpipe) {
                    nextNoteTime += (currentBeat % 2 === 0) ? secondsPerBeat * 0.6 : secondsPerBeat * 0.4;
                } else if (sig === 6 || sig === 9 || sig === 12) {
                    nextNoteTime += secondsPerBeat / 2;
                } else {
                    nextNoteTime += secondsPerBeat;
                }

                currentBeat = (currentBeat + 1) % sig;
            }
            metroTimer = setTimeout(metroScheduler, 25);
        }

        function toggleMetro() {
            if (!metroCtx) metroCtx = new (window.AudioContext || window.webkitAudioContext)();
            isMetroRunning = !isMetroRunning;
            if (isMetroRunning) {
                currentBeat = 0;
                nextNoteTime = metroCtx.currentTime + 0.05;
                metroScheduler();
                metroBtn.textContent = 'STOP MACHINE';
                metroBtn.classList.add('active-btn');
            } else {
                clearTimeout(metroTimer);
                metroBtn.textContent = 'START MACHINE';
                metroBtn.classList.remove('active-btn');
            }
        }

        createDots();
        timeSig.onchange = createDots;
        metroBtn.onclick = toggleMetro;
        document.getElementById('tempoSlider').oninput = (e) => {
            document.getElementById('bpmText').textContent = e.target.value;
        };
    </script>
</body>
</html>
