<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TDF Music Toolset</title>
    <style>
        :root {
            --bg-dark: #1a1c1a;
            --card-bg: #242b24;
            --celtic-green: #4a7c2c;
            --griffin-orange: #e67e22;
            --griffin-red: #c0392b;
            --text-light: #e0eadd;
            --lcd-bg: #0d110d;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin: 20px 0; width: 90%; }
        .logo { max-height: 80px; max-width: 100%; filter: drop-shadow(0 0 5px rgba(74, 124, 44, 0.5)); }

        .tabs {
            display: flex; width: 100%; max-width: 500px;
            background: var(--card-bg); border-radius: 15px 15px 0 0;
            overflow: hidden; border: 2px solid var(--celtic-green); border-bottom: none;
        }

        .tab {
            flex: 1; padding: 15px; text-align: center; cursor: pointer;
            font-weight: bold; background: #1a1f1a; color: #666; transition: 0.2s;
        }

        .tab.active { background: var(--card-bg); color: var(--celtic-green); border-bottom: 3px solid var(--celtic-green); }

        .container { width: 100%; max-width: 500px; padding: 0 10px; }

        .card {
            background: var(--card-bg); padding: 25px; border-radius: 0 0 25px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            border: 2px solid var(--celtic-green);
        }

        .tool-content { display: none; }
        .tool-content.active { display: block; }

        .display-container { background: var(--lcd-bg); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--celtic-green); position: relative; }
        .display { font-family: 'Courier New', monospace; font-size: 60px; font-weight: bold; color: var(--celtic-green); }
        
        .beat-indicators { display: flex; justify-content: center; gap: 8px; margin-top: 10px; height: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #333; transition: 0.1s; }
        .dot.active { background: var(--griffin-orange); transform: scale(1.2); }
        .dot.accent { background: var(--celtic-green); transform: scale(1.4); box-shadow: 0 0 8px var(--celtic-green); }

        .vu-meter { position: relative; width: 100%; height: 80px; background: #050705; border-radius: 12px; border: 1px solid var(--celtic-green); overflow: hidden; margin-bottom: 10px; }
        .needle { position: absolute; bottom: 0; left: 50%; width: 2px; height: 60px; background: var(--griffin-red); transform-origin: bottom center; transition: transform 0.05s ease-out; transform: translateX(-50%) rotate(0deg); }
        .in-tune-zone { position: absolute; top: 20px; left: 50%; width: 40px; height: 10px; background: rgba(74, 124, 44, 0.2); transform: translateX(-50%); border-radius: 4px; }
        .active-tune { background: #2ecc71 !important; box-shadow: 0 0 10px #2ecc71; }

        select, input[type=range] {
            width: 100%; padding: 12px; margin: 10px 0 20px 0;
            border-radius: 8px; background: #111; color: white; border: 1px solid var(--celtic-green); font-size: 16px;
        }

        button {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            font-size: 18px; font-weight: bold; color: white;
            background: var(--celtic-green); cursor: pointer; transition: 0.1s;
            box-shadow: 0 4px 0 #2d4d1a;
        }

        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2d4d1a; }
        button.active-btn { background: var(--griffin-red); box-shadow: 0 4px 0 #8e2a1f; }

        footer { 
            margin: 40px 0; 
            text-align: center; 
            color: var(--celtic-green); 
            width: 100%; 
            max-width: 500px; 
            border-top: 2px solid var(--card-bg); 
            padding-top: 20px;
            padding-bottom: 30px;
        }
        footer .enjoy { font-weight: bold; font-size: 1.4rem; letter-spacing: 3px; margin-bottom: 5px; color: var(--griffin-orange); }
        footer .brand { font-size: 0.9rem; letter-spacing: 1px; opacity: 0.8; margin-bottom: 10px; }
        footer .email { 
            display: block; 
            color: var(--text-light) !important; 
            text-decoration: none; 
            font-size: 1rem; 
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

    <div class="tabs">
        <div class="tab active" onclick="switchTool('metro')">METRONOOM</div>
        <div class="tab" onclick="switchTool('tuner')">STEMAPPARAAT</div>
    </div>

    <div class="container">
        <div class="card">
            <div id="metro" class="tool-content active">
                <div class="display-container">
                    <div id="bpmValue" class="display">120</div>
                    <div style="color: var(--celtic-green); font-size: 14px; letter-spacing: 2px;">BPM</div>
                    <div id="indicatorContainer" class="beat-indicators"></div>
                </div>
                
                <input type="range" id="bpmSlider" min="40" max="220" value="120">
                
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <select id="timeSignature" style="margin: 0; flex: 1;">
                        <option value="4">4/4 MAAT</option>
                        <option value="3">3/4 MAAT</option>
                        <option value="2">2/4 MAAT</option>
                        <option value="6">6/8 MAAT</option>
                    </select>
                </div>

                <button id="btnMetro">START METRONOOM</button>
            </div>

            <div id="tuner" class="tool-content">
                <div class="display-container">
                    <div id="noteDisplay" class="display" style="font-size: 80px;">--</div>
                    <div id="freqDisplay" style="color: var(--celtic-green); font-size: 14px;">0.00 Hz</div>
                </div>

                <div class="vu-meter">
                    <div class="in-tune-zone" id="tuneZone"></div>
                    <div id="needle" class="needle"></div>
                </div>

                <button id="btnTuner">START STEMAPPARAAT</button>
                <p style="font-size: 12px; margin-top: 15px; opacity: 0.6;">Gebruik je microfoon voor de beste resultaten</p>
            </div>
        </div>
    </div>

    <footer>
        <div class="enjoy">ENJOY THE MUSIC</div>
        <div class="brand">TDF MUSIC TOOLSET</div>
        <a href="mailto:thijsdefretes@gmail.com" class="email">thijsdefretes@gmail.com</a>
    </footer>

    <script>
        let audioCtx = null;
        let isMetroRunning = false;
        let metroInterval = null;
        let currentBeat = 0;
        
        async function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        function switchTool(tool) {
            document.querySelectorAll('.tool-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tool).classList.add('active');
            event.currentTarget.classList.add('active');
            stopMetro(); stopTuner();
        }

        function createDots() {
            const container = document.getElementById('indicatorContainer');
            container.innerHTML = '';
            const beats = parseInt(document.getElementById('timeSignature').value);
            for(let i=0; i<beats; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                container.appendChild(dot);
            }
        }

        function stopMetro() {
            clearInterval(metroInterval);
            isMetroRunning = false;
            document.getElementById('btnMetro').innerText = "START METRONOOM";
            document.getElementById('btnMetro').classList.remove('active-btn');
            document.querySelectorAll('.dot').forEach(d => d.className = 'dot');
        }

        function startMetronome() {
            if (isMetroRunning) clearInterval(metroInterval);
            isMetroRunning = true;
            const bpm = document.getElementById('bpmSlider').value;
            const intervalTime = (60 / bpm) * 1000;
            const beatsInBar = parseInt(document.getElementById('timeSignature').value);

            metroInterval = setInterval(() => {
                const beatInBar = currentBeat % beatsInBar;
                const isAccent = beatInBar === 0;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = isAccent ? 1000 : 600;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                
                const dots = document.querySelectorAll('.dot');
                dots.forEach((d, idx) => {
                    d.className = 'dot';
                    if (idx === beatInBar) d.className = isAccent ? 'dot accent' : 'dot active';
                });

                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                currentBeat++;
            }, intervalTime);
        }

        document.getElementById('btnMetro').onclick = async function() {
            await initAudio();
            if (this.innerText.includes("START")) {
                this.innerText = "STOP METRONOOM"; this.classList.add('active-btn');
                currentBeat = 0; startMetronome();
            } else stopMetro();
        };

        document.getElementById('bpmSlider').oninput = function() {
            document.getElementById('bpmValue').innerText = this.value;
            if (document.getElementById('btnMetro').innerText.includes("STOP")) startMetronome();
        };
        
        document.getElementById('timeSignature').onchange = function() {
            createDots();
            if (document.getElementById('btnMetro').innerText.includes("STOP")) { currentBeat = 0; startMetronome(); }
        };

        createDots();
    </script>
