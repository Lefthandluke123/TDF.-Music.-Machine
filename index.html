<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TDF Pro Toolset - V2.0</title>
    
    <style>
        :root {
            --bg-dark: #1a1c1a;
            --card-bg: #242b24;
            --celtic-green: #4a7c2c;
            --griffin-orange: #e67e22;
            --griffin-red: #c0392b;
            --text-light: #e0eadd;
            --vu-paper: #eeeeee;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin: 20px 0; }
        .logo { max-height: 80px; transition: 0.1s; }
        .logo.pulse { transform: scale(1.1); filter: drop-shadow(0 0 10px var(--celtic-green)); }

        .container { width: 95%; max-width: 500px; }

        .card {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            border: 2px solid var(--celtic-green); margin-bottom: 20px;
        }

        /* VU Meter Dynamiek */
        .vu-meter {
            background: var(--vu-paper); border: 4px solid #333; border-radius: 10px;
            height: 140px; position: relative; overflow: hidden; margin-bottom: 15px;
            transition: background 0.3s ease;
        }
        .vu-meter.correct { background: #50fa7b !important; box-shadow: inset 0 0 40px #2ecc71; }
        .vu-meter.too-low { background: #ffb86c; }
        .vu-meter.too-high { background: #ff79c6; }
        .vu-meter.glow-accent { background: #f1fa8c; }

        .vu-needle {
            width: 3px; height: 100px; background: #c0392b;
            position: absolute; bottom: -5px; left: 50%;
            transform-origin: bottom center; transform: rotate(-45deg);
            transition: transform 0.2s ease-out; z-index: 5;
        }

        #noteDisplay { font-size: 2.5rem; font-weight: bold; color: #333; position: absolute; top: 10px; width: 100%; text-align: center; }

        .bpm-display { font-size: 3rem; font-weight: bold; color: var(--celtic-green); }
        button {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; color: white;
            background: var(--celtic-green); cursor: pointer; margin-top: 5px;
        }
        button.active-btn { background: var(--griffin-red); }

        .dot { width: 12px; height: 12px; background: #333; border-radius: 50%; display: inline-block; margin: 3px; }
        .dot.lit { background: var(--celtic-green); }

        footer { padding: 20px; color: #666; font-size: 11px; text-align: center; }
    </style>
</head>

<body>
    <div class="header">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzRhN2MyYyI+PHBhdGggZD0iTTEyIDJMMiA3djEwbDEwIDUgMTAtNVY3TDEyIDJ6bTAgMi44bTcuNSAzLjdMMTIgMTIuMSA0LjUgOC41IDEyIDQuOHpNNCAxNi4xVjkuNWw3IDIuNnY2LjZsLTcgLTIuNnptMTYgMEwxMyAxOC43di02LjZsNy0yLjZ2Ni42eiIvPjwvc3ZnPg==" 
             id="mainLogo" class="logo" alt="TDF Logo">
        <h1>TDF Pro Machine</h1>
    </div>

    <div class="container">
        <div class="card">
            <div class="vu-meter" id="vuBox">
                <div id="noteDisplay">-</div>
                <div class="vu-needle" id="needle"></div>
            </div>

            <div class="bpm-display" id="bpmText">110</div>
            <input type="range" id="tempoSlider" min="40" max="220" value="110">
            
            <select id="timeSig">
                <option value="4">Reel (4/4)</option>
                <option value="4h">Hornpipe (Swung)</option>
                <option value="6">Jig (6/8)</option>
            </select>
            
            <div id="dots"></div>
            <button id="metroBtn">START METRONOOM</button>
        </div>

        <div class="card">
            <button id="tunerBtn">START LIVE TUNER</button>
        </div>
    </div>

    <footer>&copy; 2024 TDF MUSIC - ANALOOG/DIGITAAL HYBRIDE</footer>

    <script>
        let audioCtx, metroTimer, isRunning = false, isTuning = false;
        let nextNoteTime = 0.0, currentBeat = 0;
        let analyser, dataArray;

        const needle = document.getElementById('needle');
        const vuBox = document.getElementById('vuBox');
        const noteDisplay = document.getElementById('noteDisplay');

        // Pitch Tracking
        const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        async function startTuner() {
            if (!audioCtx) audioCtx = new AudioContext();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);
            dataArray = new Float32Array(analyser.fftSize);
            drawTuner();
        }

        function drawTuner() {
            if (!isTuning) return;
            analyser.getFloatTimeDomainData(dataArray);
            const freq = autoCorrelate(dataArray, audioCtx.sampleRate);

            if (freq !== -1) {
                const h = 12 * Math.log2(freq / 440);
                const noteIndex = (Math.round(h) + 69) % 12;
                noteDisplay.textContent = notes[noteIndex];
                
                const cents = Math.floor(100 * (h - Math.round(h)));
                needle.style.transform = `rotate(${cents}deg)`;

                // KLEUR FEEDBACK OP BASIS VAN JUISTHEID
                if (Math.abs(cents) < 5) {
                    vuBox.className = "vu-meter correct"; // PERFECT STAMELEND GROEN
                } else if (cents < 0) {
                    vuBox.className = "vu-meter too-low"; // TE LAAG
                } else {
                    vuBox.className = "vu-meter too-high"; // TE HOOG
                }
            }
            requestAnimationFrame(drawTuner);
        }

        function autoCorrelate(buf, sampleRate) {
            let rms = 0;
            for (let i=0; i<buf.length; i++) rms += buf[i]*buf[i];
            if (Math.sqrt(rms/buf.length) < 0.01) return -1;
            let c = new Float32Array(buf.length);
            for (let i=0; i<buf.length; i++) for (let j=0; j<buf.length-i; j++) c[i] = c[i] + buf[j]*buf[j+i];
            let d=0; while (c[d]>c[d+1]) d++;
            let maxval=-1, maxpos=-1;
            for (let i=d; i<buf.length; i++) if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            return sampleRate/maxpos;
        }

        // Metronoom
        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                const isAccent = currentBeat === 0;
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = isAccent ? 880 : 440;
                g.gain.setValueAtTime(0.3, nextNoteTime);
                g.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.1);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(nextNoteTime); osc.stop(nextNoteTime + 0.2);

                const bIdx = currentBeat;
                setTimeout(() => {
                    if (!isTuning) {
                        vuBox.className = isAccent ? "vu-meter glow-accent" : "vu-meter";
                        needle.style.transform = `rotate(${isAccent ? 30 : -20}deg)`;
                        setTimeout(() => vuBox.className = "vu-meter", 100);
                    }
                    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('lit', i === bIdx));
                }, (nextNoteTime - audioCtx.currentTime) * 1000);

                nextNoteTime += 60.0 / parseInt(tempoSlider.value);
                currentBeat = (currentBeat + 1) % parseInt(timeSig.value);
            }
            metroTimer = setTimeout(scheduler, 25);
        }

        metroBtn.onclick = () => {
            if (!audioCtx) audioCtx = new AudioContext();
            isRunning = !isRunning;
            if (isRunning) { currentBeat = 0; nextNoteTime = audioCtx.currentTime; scheduler(); metroBtn.textContent="STOP"; }
            else { clearTimeout(metroTimer); metroBtn.textContent="START METRONOOM"; }
        };

        tunerBtn.onclick = () => {
            isTuning = !isTuning;
            if (isTuning) { startTuner(); tunerBtn.textContent = "STOP TUNER"; }
            else { tunerBtn.textContent = "START LIVE TUNER"; vuBox.className = "vu-meter"; }
        };

        function createDots() {
            const dots = document.getElementById('dots');
            dots.innerHTML = '';
            for(let i=0; i<parseInt(timeSig.value); i++) dots.innerHTML += '<div class="dot"></div>';
        }
        timeSig.onchange = createDots;
        tempoSlider.oninput = () => bpmText.textContent = tempoSlider.value;
        createDots();
    </script>
</body>
</html>
