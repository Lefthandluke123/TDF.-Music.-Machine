<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Doggy Few Music Machine</title>
    
    <style>
        :root {
            --bg-dark: #121412;
            --card-bg: #1e241e;
            --celtic-green: #2d5a27;
            --griffin-orange: #d48e3d;
            --griffin-red: #a8281a;
            --text-light: #f0f4ef;
            --paper: #e6dab7;
            --tune-success: #2ecc71;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
        }

        .header { text-align: center; margin: 25px 0; width: 100%; }
        .header h1 { 
            font-variant: small-caps; 
            letter-spacing: 2px; 
            color: var(--griffin-orange); 
            line-height: 1.1;
            margin: 0;
            font-size: clamp(1.8rem, 8vw, 2.8rem);
        }

        .container { 
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%; 
            max-width: 1000px; 
            margin-bottom: 40px;
        }

        @media (min-width: 768px) {
            .container { grid-template-columns: 1fr 1fr; align-items: start; }
        }

        .card {
            background: var(--card-bg); 
            padding: clamp(20px, 5vw, 30px); 
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); 
            text-align: center;
            border: 3px double var(--celtic-green);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.in-tune { border-color: var(--tune-success); box-shadow: 0 0 30px rgba(46, 204, 113, 0.5); }

        h2 { color: var(--griffin-orange); font-size: 1.1rem; margin-top: 0; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 12px; letter-spacing: 1px; }

        .vu-meter {
            background: var(--paper);
            background-image: radial-gradient(circle at center, #f0e6cc 0%, #d4c4a1 100%);
            border: 6px solid #3a2a1a;
            border-radius: 10px 10px 50% 50%;
            aspect-ratio: 16 / 10;
            width: 100%;
            position: relative; 
            overflow: hidden; 
            margin: 20px 0;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.4);
        }

        .in-tune .vu-meter { background-image: radial-gradient(circle at center, #e8f8f5 0%, #abebc6 100%); }

        .vu-needle {
            width: 3px; height: 78%; background: var(--griffin-red);
            position: absolute; bottom: -8%; left: 50%;
            transform-origin: bottom center; transform: rotate(0deg);
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10;
        }

        #noteDisplay { 
            font-size: clamp(2.5rem, 12vw, 4rem); font-weight: bold; color: #3a2a1a; 
            position: absolute; bottom: 15%; width: 100%; text-align: center;
        }

        .string-nodes { display: flex; justify-content: center; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
        .string-node {
            width: clamp(40px, 10vw, 45px); height: clamp(40px, 10vw, 45px); border-radius: 50%; background: #111;
            border: 2px solid var(--celtic-green); color: var(--paper);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .string-node.active-string { background: var(--griffin-orange); border-color: white; transform: scale(1.1); }

        .bpm-display { font-size: clamp(3.5rem, 15vw, 5rem); font-weight: bold; color: var(--celtic-green); font-family: 'Courier New', monospace; margin: 10px 0; }
        
        select, input[type=range] {
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 6px;
            background: #0f110f; color: var(--paper); border: 1px solid var(--celtic-green);
            font-size: 16px;
        }

        input[type=range] { accent-color: var(--griffin-orange); height: 8px; cursor: pointer; }

        button {
            width: 100%; padding: 20px; border: none; border-radius: 8px;
            font-size: 18px; font-weight: bold; color: white;
            background: var(--celtic-green); cursor: pointer;
            border-bottom: 5px solid #1a3a16; transition: all 0.1s; text-transform: uppercase;
        }
        button.active-btn { background: var(--griffin-red); border-bottom-color: #7a1d13; }

        .dot-container { margin: 15px 0; min-height: 25px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; }
        .dot { width: 12px; height: 12px; background: #000; border-radius: 50%; display: inline-block; margin: 4px; border: 1px solid #333; }
        .dot.lit { background: var(--griffin-orange); box-shadow: 0 0 12px var(--griffin-orange); }

        footer { 
            margin-top: auto; padding: 50px 20px; text-align: center; color: var(--text-light); 
            font-size: 0.9rem; opacity: 0.6; border-top: 1px solid #333; width: 100%;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>The Doggy Few<br>Music Machine</h1>
    </div>

    <div class="container">
        <div class="card" id="tunerCard">
            <h2>Live Tuner</h2>
            <div class="vu-meter">
                <svg viewBox="0 0 200 120" style="position:absolute; width:100%; height:100%;">
                    <path d="M 40 100 A 70 70 0 0 1 160 100" fill="none" stroke="#3a2a1a" stroke-width="2.5" opacity="0.6" />
                    <line x1="100" y1="35" x2="100" y2="25" stroke="#3a2a1a" stroke-width="3" />
                    <text x="94" y="20" font-size="12" fill="#3a2a1a" font-weight="bold">0</text>
                </svg>
                <div id="noteDisplay">-</div>
                <div class="vu-needle" id="needle"></div>
            </div>
            <select id="instrumentSelect"></select>
            <div class="string-nodes" id="stringNodes"></div>
            <button id="tunerBtn">START TUNER</button>
        </div>

        <div class="card">
            <h2>TDF Metronoom</h2>
            <div class="bpm-display" id="bpmText">110</div>
            <input type="range" id="tempoSlider" min="40" max="220" value="110">
            <select id="timeSig">
                <option value="2">2/4 Polka</option>
                <option value="3">3/4 Wals</option>
                <option value="4" selected>4/4 Reel</option>
                <option value="4hp">4/4 Hornpipe (Dotted)</option>
                <option value="6">6/8 Jig (Swing)</option>
                <option value="9">9/8 Slipjig (Swing)</option>
                <option value="12">12/8 Slide (Celtic Swing)</option>
            </select>
            <div id="dots" class="dot-container"></div>
            <button id="metroBtn">START METRONOOM</button>
        </div>
    </div>

    <footer>
        &copy; 2026 THE DOGGY FEW &bull; MUSIC MACHINE PRO
    </footer>

    <script>
        const INSTRUMENTS = {
            "Gitaar (Standaard)": [82.41, 110.0, 146.83, 196.0, 246.94, 329.63],
            "Gitaar (DADGAD)": [73.42, 110.0, 146.83, 196.0, 220.0, 293.66],
            "Ukelele": [392.0, 261.63, 329.63, 440.0],
            "Bouzouki (GDAD)": [196.0, 146.83, 220.0, 293.66],
            "Viool": [196.0, 293.66, 440.0, 659.25]
        };
        const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        let audioCtx, metroTimer, isRunning = false, isTuning = false;
        let nextNoteTime = 0.0, currentBeat = 0, analyser, dataArray, centsHistory = [];
        let activeSource = null;

        const tunerBtn = document.getElementById('tunerBtn');
        const metroBtn = document.getElementById('metroBtn');
        const instrumentSelect = document.getElementById('instrumentSelect');
        const stringNodes = document.getElementById('stringNodes');

        Object.keys(INSTRUMENTS).forEach(inst => {
            let opt = document.createElement('option'); opt.value = inst; opt.textContent = inst;
            instrumentSelect.appendChild(opt);
        });

        function updateStringNodes() {
            stringNodes.innerHTML = '';
            INSTRUMENTS[instrumentSelect.value].forEach(freq => {
                let node = document.createElement('div');
                node.className = 'string-node';
                let h = 12 * Math.log2(freq / 440);
                node.textContent = NOTES[(Math.round(h) + 69) % 12];
                node.onclick = () => playReference(freq);
                stringNodes.appendChild(node);
            });
        }

        function playReference(freq) {
            initAudio();
            if (activeSource) { activeSource.stop(); }
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime + 1.8);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 2.0);
            activeSource = osc;
        }

        function playClick(time, isAccent) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(isAccent ? 1200 : 800, time);
            g.gain.setValueAtTime(0.5, time);
            g.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(time); osc.stop(time + 0.05);
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        async function startTuner() {
            initAudio();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 4096;
                source.connect(analyser);
                dataArray = new Float32Array(analyser.fftSize);
                drawTuner();
            } catch (err) { alert("Microfoon toegang geweigerd."); stopTuner(); }
        }

        function drawTuner() {
            if (!isTuning) return;
            analyser.getFloatTimeDomainData(dataArray);
            let freq = autoCorrelate(dataArray, audioCtx.sampleRate);
            if (freq !== -1) {
                let h = 12 * Math.log2(freq / 440);
                let noteIndex = (Math.round(h) + 69) % 12;
                document.getElementById('noteDisplay').textContent = NOTES[noteIndex];
                let targetFreqs = INSTRUMENTS[instrumentSelect.value];
                let closest = targetFreqs.reduce((a, b) => Math.abs(b - freq) < Math.abs(a - freq) ? b : a);
                let centsOff = 1200 * Math.log2(freq / closest);
                centsHistory.push(centsOff);
                if (centsHistory.length > 30) centsHistory.shift();
                let median = [...centsHistory].sort((a, b) => a - b)[Math.floor(centsHistory.length / 2)];
                document.getElementById('needle').style.transform = `rotate(${Math.max(-50, Math.min(50, median)) * 0.9}deg)`;
                document.getElementById('tunerCard').classList.toggle('in-tune', Math.abs(median) < 4);
            }
            requestAnimationFrame(drawTuner);
        }

        function autoCorrelate(buf, sampleRate) {
            let rms = 0;
            for (let i=0; i<buf.length; i++) rms += buf[i]*buf[i];
            if (Math.sqrt(rms/buf.length) < 0.015) return -1;
            let c = new Float32Array(buf.length);
            for (let i=0; i<buf.length; i++) for (let j=0; j<buf.length-i; j++) c[i] = c[i] + buf[j]*buf[j+i];
            let d=0; while (c[d]>c[d+1]) d++;
            let maxval=-1, maxpos=-1;
            for (let i=d; i<buf.length; i++) if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            return sampleRate/maxpos;
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                const tsValue = document.getElementById('timeSig').value;
                const isHornpipe = tsValue === '4hp';
                const maat = isHornpipe ? 4 : parseInt(tsValue);
                
                let isAccent = (currentBeat === 0 || (maat === 6 && currentBeat === 3) || (maat === 9 && (currentBeat === 3 || currentBeat === 6)) || (maat === 12 && currentBeat % 3 === 0));
                playClick(nextNoteTime, isAccent);

                let bIdx = currentBeat;
                setTimeout(() => {
                    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('lit', i === bIdx));
                }, (nextNoteTime - audioCtx.currentTime) * 1000);

                let baseInterval = 60.0 / parseInt(document.getElementById('tempoSlider').value);
                
                // Feel Engine
                let timingFactor = 1.0;
                if (isHornpipe) {
                    timingFactor = (currentBeat % 2 === 0) ? 1.3 : 0.7; // Hornpipe Shuffle
                } else if (maat >= 6) {
                    timingFactor = (currentBeat % 3 === 0) ? 1.2 : (currentBeat % 3 === 2) ? 0.8 : 1.0; // Jig Swing
                }

                nextNoteTime += (baseInterval / (maat >= 6 ? 2 : 1)) * timingFactor;
                currentBeat = (currentBeat + 1) % maat;
            }
            metroTimer = setTimeout(scheduler, 25);
        }

        metroBtn.onclick = () => {
            initAudio();
            isRunning = !isRunning;
            if (isRunning) { currentBeat = 0; nextNoteTime = audioCtx.currentTime; scheduler(); metroBtn.textContent="STOP"; metroBtn.classList.add('active-btn'); }
            else { clearTimeout(metroTimer); metroBtn.textContent="START METRONOOM"; metroBtn.classList.remove('active-btn'); }
        };

        tunerBtn.onclick = () => {
            initAudio();
            isTuning = !isTuning;
            if (isTuning) { centsHistory = []; startTuner(); tunerBtn.textContent = "STOP TUNER"; tunerBtn.classList.add('active-btn'); }
            else { stopTuner(); }
        };

        function stopTuner() {
            isTuning = false; tunerBtn.textContent = "START TUNER"; tunerBtn.classList.remove('active-btn');
            document.getElementById('tunerCard').classList.remove('in-tune'); document.getElementById('noteDisplay').textContent = "-";
            document.getElementById('needle').style.transform = "rotate(0deg)";
        }

        function createDots() {
            const container = document.getElementById('dots'); container.innerHTML = '';
            const tsValue = document.getElementById('timeSig').value;
            const aantal = tsValue === '4hp' ? 4 : parseInt(tsValue);
            for(let i=0; i<aantal; i++) {
                let d = document.createElement('div'); d.className = 'dot'; container.appendChild(d);
            }
        }

        instrumentSelect.onchange = updateStringNodes;
        document.getElementById('timeSig').onchange = createDots;
        document.getElementById('tempoSlider').oninput = () => document.getElementById('bpmText').textContent = document.getElementById('tempoSlider').value;
        
        updateStringNodes();
        createDots();
    </script>
</body>
</html>
